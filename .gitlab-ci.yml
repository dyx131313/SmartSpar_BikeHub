stages:
  - test
  - build

# 全局缓存配置，加快构建速度
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - backend/.pip_cache/
    - frontend/bikehub/node_modules/
    - frontend/bikehub/.pnpm-store/

# ==========================================
# Backend Jobs (Python/Flask)
# ==========================================

backend-test:
  stage: test
  image: python:3.13
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/backend/.pip_cache"
  before_script:
    - cd backend
    - pip install -r requirements.txt
  script:
    # 设置 PYTHONPATH 确保能导入 app 模块
    - export PYTHONPATH=$PYTHONPATH:.
    - pytest test/
  rules:
    # 仅当 backend 目录下的文件发生变化时触发
    - changes:
        - backend/**/*
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Frontend Jobs (React/Vite/pnpm)
# ==========================================

.frontend-base:
  image: node:20
  before_script:
    - cd frontend/bikehub
    # 启用 corepack 以使用 pnpm
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install

frontend-lint:
  extends: .frontend-base
  stage: test
  script:
    - pnpm lint
    - pnpm format:check
  rules:
    - changes:
        - frontend/bikehub/**/*
    - if: $CI_COMMIT_BRANCH == "main"

frontend-build:
  extends: .frontend-base
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - frontend/bikehub/dist/
    expire_in: 1 week
  rules:
    - changes:
        - frontend/bikehub/**/*
    - if: $CI_COMMIT_BRANCH == "main"
