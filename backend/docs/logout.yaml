openapi: 3.0.3
info:
  title: BikeHub 用户认证模块
  description: 用户登录/登出接口（仅登出示例）
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: 本地开发
  - url: https://api.bikehub.com
    description: 生产环境

# ===== 统一安全方案 =====
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  # ===== 公共 Schema 也放在同一个 components 里 =====
  schemas:
    ErrorResp:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: Unauthorized

# ===== 全局默认需要登录 =====
security:
  - bearerAuth: []

paths:
  /api/auth/logout:
    post:
      summary: 用户登出
      description: 需要登录态；成功返回当前服务器时间
      operationId: logout
      tags:
        - Auth
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 登出成功
                  logout_time:
                    type: string
                    format: date-time
                    example: 2025-11-19T14:23:45+08:00
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'