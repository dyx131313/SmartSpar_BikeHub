openapi: 3.0.3
info:
  title: 智慧共享单车调度系统 - 群聊功能API
  description: 完整的群聊功能API文档，包括群聊管理、消息传输、用户管理、WebSocket实时通信等核心功能
  version: 1.0.0
  contact:
    name: 开发团队
    email: support@bikehub.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000/api/chat
    description: 开发环境
  - url: https://api.bikehub.com/api/chat
    description: 生产环境

tags:
  - name: 群聊管理
    description: 群聊的创建、查询、更新、删除等管理功能
  - name: 群聊成员
    description: 群聊成员的添加、移除、权限管理等功能
  - name: 消息管理
    description: 消息的发送、编辑、撤回、标记已读等功能
  - name: 搜索功能
    description: 群聊搜索、消息搜索、用户搜索等功能
  - name: 统计信息
    description: 聊天统计、未读消息数量等统计功能
  - name: 文件上传
    description: 文件上传相关功能
  - name: 管理员功能
    description: 管理员专用的群聊管理功能
  - name: WebSocket
    description: WebSocket实时通信接口

paths:
  /groups:
    get:
      tags:
        - 群聊管理
      summary: 获取用户群聊列表
      description: 获取当前用户所属的群聊列表，支持分页
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码，默认为1
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: 每页数量，默认20，最大100
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 成功获取群聊列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupInfo'
                  total:
                    type: integer
                    description: 总群聊数量
                  page:
                    type: integer
                    description: 当前页码
                  page_size:
                    type: integer
                    description: 每页数量
                  has_more:
                    type: boolean
                    description: 是否有更多数据
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - 群聊管理
      summary: 创建群聊
      description: 创建一个新的群聊
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - group_type
              properties:
                name:
                  type: string
                  description: 群聊名称
                  example: 新群聊
                description:
                  type: string
                  description: 群聊描述
                  example: 群聊描述
                group_type:
                  $ref: '#/components/schemas/GroupType'
                max_members:
                  type: integer
                  minimum: 2
                  maximum: 500
                  default: 100
                  description: 最大成员数
      responses:
        '201':
          description: 群聊创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 群聊创建成功
                  group:
                    $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /groups/{group_id}:
    get:
      tags:
        - 群聊管理
      summary: 获取群聊详情
      description: 获取指定群聊的详细信息
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 成功获取群聊详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 运维交流群
                      description:
                        type: string
                        example: 运维人员交流群
                      group_type:
                        $ref: '#/components/schemas/GroupType'
                      max_members:
                        type: integer
                        example: 100
                      member_count:
                        type: integer
                        example: 15
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - 群聊管理
      summary: 更新群聊信息
      description: 更新指定群聊的信息（仅群主和管理员）
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 更新后的群名
                  example: 更新后的群名
                description:
                  type: string
                  description: 更新后的描述
                  example: 更新后的描述
                max_members:
                  type: integer
                  minimum: 2
                  maximum: 500
                  description: 最大成员数
                  example: 150
      responses:
        '200':
          description: 群聊信息更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 群聊信息更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - 群聊管理
      summary: 删除群聊
      description: 删除指定的群聊（仅群主）
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 群聊删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 群聊删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /groups/{group_id}/members:
    get:
      tags:
        - 群聊成员
      summary: 获取群聊成员列表
      description: 获取指定群聊的成员列表，支持分页
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
        - name: page
          in: query
          description: 页码，默认为1
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: 每页数量，默认50，最大100
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: 成功获取成员列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupMember'
                  total:
                    type: integer
                    description: 总成员数量
                  page:
                    type: integer
                    description: 当前页码
                  page_size:
                    type: integer
                    description: 每页数量
                  has_more:
                    type: boolean
                    description: 是否有更多数据
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - 群聊成员
      summary: 添加群聊成员
      description: 向指定群聊添加新成员（需要权限）
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_ids
              properties:
                user_ids:
                  type: array
                  items:
                    type: integer
                  description: 要添加的用户ID列表
                  example: [2, 3, 4]
      responses:
        '200':
          description: 成功添加成员
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 成功添加3名成员
                  added_user_ids:
                    type: array
                    items:
                      type: integer
                    example: [2, 3, 4]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /groups/{group_id}/members/{member_id}:
    put:
      tags:
        - 群聊成员
      summary: 更新成员信息
      description: 更新群聊成员的角色和权限信息（需要权限）
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
        - name: member_id
          in: path
          required: true
          description: 成员ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: '#/components/schemas/MemberRole'
                  description: 成员角色
                nickname:
                  type: string
                  description: 成员昵称
                  example: 管理员
                is_muted:
                  type: boolean
                  description: 是否禁言
                  default: false
      responses:
        '200':
          description: 成员信息更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 成员信息更新成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - 群聊成员
      summary: 移除群聊成员
      description: 从指定群聊移除成员（需要权限）
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
        - name: member_id
          in: path
          required: true
          description: 成员ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 成员移除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 成员移除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /groups/{group_id}/leave:
    post:
      tags:
        - 群聊成员
      summary: 离开群聊
      description: 用户主动离开指定群聊
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 成功离开群聊
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 成功离开群聊
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /groups/{group_id}/messages:
    get:
      tags:
        - 消息管理
      summary: 获取群聊消息列表
      description: 获取指定群聊的消息列表，支持分页和历史消息加载
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
        - name: page
          in: query
          description: 页码，默认为1
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: 每页数量，默认50，最大100
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: before_message_id
          in: query
          description: 获取指定消息ID之前的消息（用于历史消息加载）
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 成功获取消息列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  total:
                    type: integer
                    description: 总消息数量
                  page:
                    type: integer
                    description: 当前页码
                  page_size:
                    type: integer
                    description: 每页数量
                  has_more:
                    type: boolean
                    description: 是否有更多历史消息
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - 消息管理
      summary: 发送群聊消息
      description: 向指定群聊发送消息，支持文本、图片、文件等类型
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - content
                - message_type
              properties:
                content:
                  type: string
                  description: 消息内容
                  example: Hello World
                message_type:
                  $ref: '#/components/schemas/MessageType'
                  description: 消息类型
                file:
                  type: string
                  format: binary
                  description: 文件（当消息类型为image或file时需要）
                reply_to_id:
                  type: integer
                  description: 回复的消息ID
                  example: 5
      responses:
        '201':
          description: 消息发送成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 消息发送成功
                  data:
                    $ref: '#/components/schemas/MessageBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /messages/{message_id}:
    put:
      tags:
        - 消息管理
      summary: 编辑消息
      description: 编辑已发送的消息（仅发送者本人）
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          description: 消息ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: 编辑后的消息内容
                  example: 编辑后的消息内容
      responses:
        '200':
          description: 消息编辑成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 消息编辑成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - 消息管理
      summary: 撤回消息
      description: 撤回已发送的消息（仅发送者本人和群主）
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          description: 消息ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 消息撤回成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 消息撤回成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /messages/{message_id}/read:
    post:
      tags:
        - 消息管理
      summary: 标记消息为已读
      description: 将指定消息标记为已读状态
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          description: 消息ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 消息已标记为已读
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 消息已标记为已读
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /groups/{group_id}/read-all:
    post:
      tags:
        - 消息管理
      summary: 标记群聊所有消息为已读
      description: 将指定群聊的所有未读消息标记为已读
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 所有消息已标记为已读
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 所有消息已标记为已读
                  read_count:
                    type: integer
                    description: 标记为已读的消息数量
                    example: 15
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /search:
    get:
      tags:
        - 搜索功能
      summary: 搜索聊天内容
      description: 搜索群聊、消息、用户等相关内容
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: 搜索关键词
          schema:
            type: string
            minLength: 1
        - name: type
          in: query
          required: false
          description: 搜索类型
          schema:
            type: string
            enum: [all, groups, messages, users]
            default: all
        - name: group_id
          in: query
          required: false
          description: 限制搜索的群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                          description: 匹配的群名
                        description:
                          type: string
                          description: 包含关键词的描述
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        content:
                          type: string
                          description: 包含关键词的消息内容
                        sender_name:
                          type: string
                          description: 发送者名称
                        group_name:
                          type: string
                          description: 群聊名称
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        username:
                          type: string
                        full_name:
                          type: string
                        email:
                          type: string
                        role:
                          type: string
                  total_results:
                    type: integer
                    description: 总搜索结果数量
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/search:
    get:
      tags:
        - 搜索功能
      summary: 搜索用户
      description: 根据用户名或姓名搜索用户
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: 用户名或姓名关键词
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          description: 返回结果数量限制
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 用户搜索成功
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    username:
                      type: string
                      example: testuser
                    full_name:
                      type: string
                      example: 测试用户
                    email:
                      type: string
                      example: test@example.com
                    role:
                      type: string
                      example: user
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /statistics:
    get:
      tags:
        - 统计信息
      summary: 获取聊天统计
      description: 获取用户的聊天统计信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 统计信息获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_groups:
                    type: integer
                    description: 总群聊数量
                    example: 5
                  total_messages:
                    type: integer
                    description: 总消息数量
                    example: 1500
                  unread_messages:
                    type: integer
                    description: 未读消息数量
                    example: 12
                  active_groups:
                    type: integer
                    description: 活跃群聊数量
                    example: 4
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /unread-count:
    get:
      tags:
        - 统计信息
      summary: 获取未读消息数量
      description: 获取当前用户的未读消息总数
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 未读消息数量获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread_count:
                    type: integer
                    description: 未读消息数量
                    example: 12
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /upload:
    post:
      tags:
        - 文件上传
      summary: 上传文件
      description: 上传文件到聊天服务器，支持图片、文档等格式
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 要上传的文件
      responses:
        '200':
          description: 文件上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: 文件访问URL
                    example: http://localhost:5000/uploads/chat/file_1234567890.jpg
                  filename:
                    type: string
                    description: 文件名
                    example: file.jpg
                  size:
                    type: integer
                    description: 文件大小（字节）
                    example: 1024000
                  content_type:
                    type: string
                    description: 文件MIME类型
                    example: image/jpeg
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/groups:
    get:
      tags:
        - 管理员功能
      summary: 管理员获取所有群聊
      description: 管理员获取系统中所有群聊列表
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码，默认为1
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: 每页数量，默认20，最大100
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 成功获取所有群聊列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
                  total:
                    type: integer
                    description: 总群聊数量
                  page:
                    type: integer
                    description: 当前页码
                  page_size:
                    type: integer
                    description: 每页数量
                  has_more:
                    type: boolean
                    description: 是否有更多数据
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/groups/{group_id}:
    delete:
      tags:
        - 管理员功能
      summary: 管理员删除群聊
      description: 管理员强制删除指定群聊
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 群聊删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 群聊删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/groups/{group_id}/disable:
    post:
      tags:
        - 管理员功能
      summary: 管理员禁用群聊
      description: 管理员禁用指定群聊
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 群聊禁用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 群聊禁用成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/groups/{group_id}/enable:
    post:
      tags:
        - 管理员功能
      summary: 管理员启用群聊
      description: 管理员启用已禁用的群聊
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          description: 群聊ID
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 群聊启用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 群聊启用成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    GroupType:
      type: string
      enum: [public, private, system]
      description: |
        群聊类型:
        - `public`: 公开群聊 - 任何人都可以查看和加入
        - `private`: 私密群聊 - 需要邀请才能加入
        - `system`: 系统群聊 - 系统自动管理，用户自动加入

    MessageType:
      type: string
      enum: [text, image, file, system, voice]
      description: |
        消息类型:
        - `text`: 文本消息 - 普通文本聊天
        - `image`: 图片消息 - 图片分享
        - `file`: 文件消息 - 文件分享
        - `system`: 系统消息 - 系统通知
        - `voice`: 语音消息 - 语音消息（预留）

    MemberRole:
      type: string
      enum: [owner, admin, member]
      description: |
        成员角色:
        - `owner`: 群主 - 完全管理权限，可以删除群聊
        - `admin`: 管理员 - 管理成员，禁言等权限
        - `member`: 成员 - 基本聊天权限

    Group:
      type: object
      properties:
        id:
          type: integer
          description: 群聊ID
          example: 1
        name:
          type: string
          description: 群聊名称
          example: 运维交流群
        description:
          type: string
          description: 群聊描述
          example: 运维人员交流群
        group_type:
          $ref: '#/components/schemas/GroupType'
        max_members:
          type: integer
          description: 最大成员数
          example: 100
        created_by:
          type: integer
          description: 创建者用户ID
          example: 1
        is_active:
          type: boolean
          description: 群聊是否激活
          example: true
        avatar_url:
          type: string
          nullable: true
          description: 群聊头像URL
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: "2025-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: 更新时间
          example: "2025-01-15T10:30:00Z"

    GroupInfo:
      type: object
      properties:
        id:
          type: integer
          description: 群聊ID
          example: 1
        name:
          type: string
          description: 群聊名称
          example: 运维交流群
        description:
          type: string
          description: 群聊描述
          example: 运维人员交流群
        avatar_url:
          type: string
          nullable: true
          description: 群聊头像URL
        group_type:
          $ref: '#/components/schemas/GroupType'
        max_members:
          type: integer
          description: 最大成员数
          example: 100
        created_by:
          type: integer
          description: 创建者用户ID
          example: 1
        is_active:
          type: boolean
          description: 群聊是否激活
          example: true
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: "2025-01-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: 更新时间
          example: "2025-01-15T10:30:00Z"
        member_count:
          type: integer
          description: 当前成员数量
          example: 15
        last_message_time:
          type: string
          format: date-time
          nullable: true
          description: 最后消息时间
          example: "2025-01-15T15:20:00Z"
        user_role:
          $ref: '#/components/schemas/MemberRole'
          description: 当前用户在该群聊中的角色
        is_muted:
          type: boolean
          description: 当前用户是否被禁言
          example: false
        last_read_at:
          type: string
          format: date-time
          nullable: true
          description: 当前用户最后阅读时间
          example: "2025-01-15T15:00:00Z"
        unread_count:
          type: integer
          description: 未读消息数量
          example: 3

    GroupMember:
      type: object
      properties:
        id:
          type: integer
          description: 成员ID
          example: 1
        group_id:
          type: integer
          description: 群聊ID
          example: 1
        user_id:
          type: integer
          description: 用户ID
          example: 1
        role:
          $ref: '#/components/schemas/MemberRole'
          description: 成员角色
        nickname:
          type: string
          description: 成员昵称
          example: 群主
        is_muted:
          type: boolean
          description: 是否被禁言
          example: false
        is_active:
          type: boolean
          description: 是否激活
          example: true
        joined_at:
          type: string
          format: date-time
          description: 加入时间
          example: "2025-01-15T10:30:00Z"
        last_read_at:
          type: string
          format: date-time
          nullable: true
          description: 最后阅读时间
          example: "2025-01-15T15:00:00Z"
        username:
          type: string
          description: 用户名
          example: admin
        full_name:
          type: string
          description: 用户全名
          example: 系统管理员
        email:
          type: string
          description: 用户邮箱
          example: admin@bikehub.com
        user_role:
          type: string
          description: 用户系统角色
          example: admin

    Message:
      type: object
      properties:
        id:
          type: integer
          description: 消息ID
          example: 1
        group_id:
          type: integer
          description: 群聊ID
          example: 1
        sender_id:
          type: integer
          description: 发送者ID
          example: 1
        message_type:
          $ref: '#/components/schemas/MessageType'
          description: 消息类型
        content:
          type: string
          description: 消息内容
          example: 大家好！
        file_url:
          type: string
          nullable: true
          description: 文件URL
        file_name:
          type: string
          nullable: true
          description: 文件名
        file_size:
          type: integer
          nullable: true
          description: 文件大小（字节）
        reply_to_id:
          type: integer
          nullable: true
          description: 回复的消息ID
        is_deleted:
          type: boolean
          description: 是否已删除
          example: false
        is_edited:
          type: boolean
          description: 是否已编辑
          example: false
        edited_at:
          type: string
          format: date-time
          nullable: true
          description: 编辑时间
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: "2025-01-15T10:30:00Z"
        username:
          type: string
          description: 发送者用户名
          example: admin
        full_name:
          type: string
          description: 发送者全名
          example: 系统管理员
        is_read_by_me:
          type: boolean
          description: 是否已被当前用户阅读
          example: true

    MessageBasic:
      type: object
      properties:
        id:
          type: integer
          description: 消息ID
          example: 101
        group_id:
          type: integer
          description: 群聊ID
          example: 1
        sender_id:
          type: integer
          description: 发送者ID
          example: 1
        message_type:
          $ref: '#/components/schemas/MessageType'
          description: 消息类型
        content:
          type: string
          description: 消息内容
          example: Hello World
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: "2025-01-15T15:30:00Z"
        username:
          type: string
          description: 发送者用户名
          example: admin
        full_name:
          type: string
          description: 发送者全名
          example: 系统管理员

    WebSocketMessage:
      type: object
      description: WebSocket消息基础结构
      required:
        - type
      properties:
        type:
          type: string
          description: 消息类型
          enum:
            - connection_success
            - new_message
            - message_edited
            - message_deleted
            - member_joined
            - member_left
            - user_status_changed
            - group_updated
            - user_typing
            - error
            - ping
        data:
          type: object
          description: 消息数据，内容根据type不同而变化

    Error:
      type: object
      properties:
        error:
          type: string
          description: 错误描述信息
          example: 错误描述信息

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token 认证

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 请求参数错误

    Unauthorized:
      description: 未授权访问
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 未授权访问，请提供有效的JWT Token

    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 权限不足，无法执行此操作

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 请求的资源不存在

    PayloadTooLarge:
      description: 文件过大
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 文件大小超过限制（最大10MB）

    TooManyRequests:
      description: 请求频率过高
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 请求频率过高，请稍后再试

    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: 服务器内部错误，请稍后再试

# WebSocket 连接信息 (在文档中说明)
externalDocs:
  description: WebSocket连接地址和详细说明
  url: ws://localhost:8765?token=YOUR_JWT_TOKEN