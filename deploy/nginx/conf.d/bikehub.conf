server {
    listen 80;
    server_name _;

    # Redirect all to https (if TLS will be configured)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your.domain.com;  # replace with real domain

    # TLS certificates: mount letsencrypt certs to /etc/letsencrypt
    ssl_certificate /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;

    # Frontend static
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        alias /root/SmartSpar_BikeHub/backend/app/static/;
        autoindex on; # 调试用：允许列出目录，成功后可关闭
        
        # 允许跨域（可选，防止前端 Canvas 污染）
        add_header Access-Control-Allow-Origin *;
    }
}
